name: Test Bot Lavoro Confalone
on:
  workflow_dispatch: # Questo abilita il tasto "Run workflow"

jobs:
  test_notifica:
    runs-on: ubuntu-latest
    steps:
      - name: Invia Messaggio di Prova
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Dr. Confalone, il bot è ATTIVO! Ogni mattina cercherò per lei a Roma offerte di Protesi ed Endodonzia con Exocad per il Giovedì."

I 2 clic per finire:

    Clicchi sul tasto verde "Commit changes..." in alto a destra.

    Torni sulla scheda Actions, selezioni a sinistra "Test Bot Lavoro Confalone" e prema il tasto grigio Run workflow (e poi quello verde sotto).

Cosa abbiamo ottenuto (Il Prodotto Finito):

Se questo test passa, il suo sistema è blindato. Il bot userà i suoi 30 anni di esperienza per monitorare Roma:

    Specialità: Protesi ed Endodonzia.

    Tecnologia: Scanner e Exocad.

    Obiettivo: Il Giovedì.
